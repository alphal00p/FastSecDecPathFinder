# Off-shell Euclidean triple box.
#
# This preset is intended as the no-threshold triple-box DOT case to keep in
# the regular FSD study list.  It intentionally has no default pySecDec target:
# the corresponding pySecDec package generation can exceed the 30 GiB local
# watchdog limit, while FSD explicit prepared-bundle generation is lightweight.
dot-file: ../graphs/triple_box.dot
kinematics: ../graphs/triple_box_offshell_kinematics.yaml
dot-engine: fsd
sector-method: iterative
prefactor-convention: pysecdec
subtraction-backend: projector-formula
explicit: true
symbolic-derivatives: true
max-weight-precision-xi: 0.9
stability-threshold: 1.0e-3
medium-precision-stability-threshold: 1.0e-6
high-precision-stability-threshold: 1.0e-8
stability-precision: 32
medium-precision-stability-precision: 100
high-precision-stability-precision: 1000
max-eps-order: 0
samples-per-iter: 100000
batch-size: 10000
max-iter: 3
min-iter: 1
workers: 10
result-path: ../outputs/dot_triple_box_offshell_result.json
